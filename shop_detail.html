<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店舗詳細 | 駒川商店街</title>
    <meta name="description" content="駒川商店街の店舗詳細情報。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Shop Detail Specific Styles */
        .shop-detail-hero {
            height: 60vh;
            min-height: 400px;
            position: relative;
            background-color: var(--color-primary);
            overflow: hidden;
        }

        .shop-detail-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .shop-detail-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 20px;
        }

        .shop-detail-title {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .shop-detail-category {
            display: inline-block;
            background-color: var(--color-accent);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .shop-detail-content {
            padding: 60px 0;
        }

        .shop-info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        @media (min-width: 900px) {
            .shop-info-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        .shop-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--color-text-body);
            margin-bottom: 40px;
        }

        .shop-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .shop-gallery-item {
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
        }

        .shop-gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .shop-gallery-item:hover img {
            transform: scale(1.1);
        }

        .shop-info-sidebar {
            background: white;
            padding: 30px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .info-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .info-icon {
            font-size: 1.5rem;
            color: var(--color-primary);
            width: 30px;
            text-align: center;
        }

        .info-label {
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
            color: var(--color-text-heading);
        }

        .info-text {
            color: var(--color-text-body);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .map-embed {
            width: 100%;
            height: 250px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-top: 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
            color: var(--color-text-light);
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--color-primary);
        }

        .loading-spinner {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--color-text-light);
        }
    </style>
</head>

<body>

        <button id="lightboxClose" class="lightbox-close">&times;</button>
